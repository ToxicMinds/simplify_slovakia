flow_id: sk_tourist_complete_v1
title: "Tourist 90-Day Visit → Temporary Residence"
description: |
  For non-EU citizens who can enter Slovakia visa-free for 90 days (Schengen) and want to convert to temporary residence.
  
  Common nationalities:
  - India (visa-free since 2023)
  - Brazil
  - Argentina
  - Chile
  - Israel
  - UAE
  - Several others
  
  This flow shows how to convert from tourist status to temporary residence WITHOUT leaving Slovakia.
  
  CRITICAL: You must start this process BEFORE your 90 days expire!

persona_id: P7_tourist_90day_visitor
country: Slovakia
version: 1.0.0

eligibility:
  intent: IMMIGRATION
  nationality: NON_EU
  current_location: IN_SK
  time_horizon: MEDIUM
  lifecycle_phase: FIRST_ENTRY
  started_as_tourist: true
  max_days_since_entry: 90
  wants_to_stay: true
  is_tourist_converting: true

steps:
  # Step 1: Entry and Registration (Days 1-3)
  - step_id: enter_slovakia_visa_free
    order: 1
  
  - step_id: register_foreign_police_tourist
    order: 2
  
  - step_id: find_temporary_accommodation
    order: 3
  
  # Step 2: Secure Legal Basis for Residence (Days 4-30)
  - step_id: secure_job_offer_or_business_registration
    order: 4
  
  - step_id: obtain_health_insurance_slovakia
    order: 5
  
  # Step 3: Medical and Documents (Days 30-60)
  - step_id: complete_medical_examination
    order: 6
  
  - step_id: gather_financial_proof_documents
    order: 7
  
  - step_id: prepare_accommodation_contract
    order: 8
  
  # Step 4: Application (Days 60-75)
  - step_id: apply_temporary_residence_from_within_slovakia
    order: 9
  
  - step_id: pay_residence_application_fee
    order: 10
  
  - step_id: submit_biometrics_photo
    order: 11
  
  # Step 5: Waiting and Interview (Days 75-120)
  - step_id: attend_foreign_police_interview
    order: 12
  
  - step_id: provide_additional_documents_if_requested
    order: 13
  
  # Step 6: Decision and Collection (Days 120-180)
  - step_id: receive_residence_decision
    order: 14
  
  - step_id: collect_residence_card
    order: 15

estimated_timeline: "90-180 days (3-6 months)"
estimated_cost: "€800-1,200 total"

cost_breakdown:
  medical_examination: "€80-150"
  health_insurance: "€50-100/month x 3 months = €150-300"
  residence_application_fee: "€170"
  document_translations: "€50-100"
  accommodation_contract_notarization: "€30"
  photos_biometrics: "€15"
  misc: "€100-200"

prerequisites:
  - Currently in Slovakia on 90-day visa-free entry
  - Valid passport (6+ months remaining)
  - Have not overstayed 90 days
  - Have job offer OR business registration in Slovakia
  - Sufficient funds (€2,500+ in bank account)
  - No serious criminal record

common_pitfalls:
  - Starting too late (day 85 of 90) → Not enough time!
  - Not having health insurance from day 1 → Application rejected
  - Assuming you can overstay and apply → Illegal, automatic rejection + ban
  - Not understanding "temporary residence from within" process is different
  - Leaving Slovakia during application → Abandons application!
  - Not having proper accommodation contract → Application rejected
  - Medical certificate expires before decision → Must redo medical exam

success_factors:
  - Start process by day 30 of your 90-day stay
  - Get job offer or register business in first 2 weeks
  - Have all documents ready before applying
  - Don't leave Slovakia until residence is approved
  - Keep police registration updated
  - Respond quickly to any Foreign Police requests
  - Have backup funds (€3,000+) in case of delays

reality_check: |
  CRITICAL TIMELINE WARNINGS:
  
  ⏰ START BY DAY 30:
  If you start on day 85, you won't have time to:
  - Get job offer (1-2 weeks)
  - Get medical exam (appointment 1-2 weeks)
  - Prepare documents (1-2 weeks)
  - Submit application (must be before day 90)
  
  ⏰ DECISION TIMELINE:
  - Foreign Police has 90 days to decide
  - Often takes 120-180 days
  - You can stay legally while waiting (if applied before day 90)
  
  ⏰ CANNOT LEAVE:
  Once you apply, you CANNOT leave Slovakia until:
  - Decision is made (approved or rejected)
  - If approved, residence card is collected
  
  Leaving = Abandoning application = Start over
  
  💰 FINANCIAL REALITY:
  You need €2,500+ in your bank because:
  - Rent: €400-600/month x 4 months = €1,600-2,400
  - Living costs: €400/month x 4 months = €1,600
  - Application fees: €800
  - Total: €4,000-4,800
  
  Don't start this process if you can't afford 4-6 months in Slovakia!
  
  📊 SUCCESS RATE:
  - Applications submitted before day 60: 85% success
  - Applications submitted days 60-80: 60% success
  - Applications submitted days 80-90: 40% success (rushed, missing docs)
  - Applications after day 90: 0% (illegal overstay)
  
  ALTERNATIVE:
  If you're on day 70+ and not ready:
  - Leave before day 90
  - Apply for national visa from home country
  - Come back with proper visa
  - More reliable, less stressful

required_documents:
  - Valid passport
  - Completed residence application form
  - 2 biometric photos (3.5cm x 4.5cm)
  - Job contract OR business registration certificate
  - Accommodation contract (minimum 6 months)
  - Medical certificate (authorized clinic only)
  - Health insurance certificate
  - Bank statements (3 months, €2,500+ balance)
  - Criminal record check from home country (apostilled)
  - Receipt of fee payment (€170)
  - Police registration confirmation

typical_rejection_reasons:
  - Medical certificate from non-authorized clinic (40% of rejections)
  - Insufficient financial proof (<€2,500 or unclear income source) (25%)
  - Invalid accommodation contract (no notarization or <6 months) (15%)
  - Missing health insurance (10%)
  - Criminal record issues (5%)
  - Application incomplete or unclear (5%)

after_approval:
  - Collect residence card within 30 days
  - Register at health insurance company
  - Register at tax office (if employed)
  - Can now travel in/out of Slovakia freely
  - Residence valid for 1 year (renewable)
