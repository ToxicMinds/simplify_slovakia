step_id: understand_residence_permit_urgency
title: Understand Residence Permit Timeline Urgency
applies_to:
  persona: emergency_just_landed
preconditions:
- foreign_police_registered
- employer_contacted
outputs:
- residence_timeline_understood
description: "You have entered Slovakia on National Visa (Type D). This gives you\
  \ only\n90 DAYS to complete your residence permit application. Here's your critical\
  \ timeline:\n\nFIRST 3 WORKING DAYS (ABSOLUTE DEADLINE):\n- Register at Foreign\
  \ Police\n- Bring: passport, visa, accommodation proof\n- Failure = fine €50-1,000\n\
  \nWITHIN FIRST WEEK:\n- Open bank account (needed for residence application)\n-\
  \ Get SIM card (needed for communication with authorities)\n- Register with health\
  \ insurance\n\nWITHIN 30 DAYS:\n- Gather all documents for residence permit:\n \
  \ * Employment contract (from employer)\n  * Accommodation proof (long-term rental\
  \ or owner's consent)\n  * Health insurance card\n  * Bank statements\n  * Criminal\
  \ record from home country (if not done before arrival)\n\nWITHIN 60 DAYS:\n- SUBMIT\
  \ residence permit application at Foreign Police\n- Book appointment early (can\
  \ take 2-4 weeks for slot)\n\nDAY 90:\n- Your national visa EXPIRES\n- If you haven't\
  \ submitted residence application by then, you must LEAVE Slovakia\n- Overstaying\
  \ = illegal residence, fines, deportation, 2-year ban\n\nAfter submission:\n- You\
  \ receive receipt allowing legal stay during 60-90 day processing\n- Your visa expiry\
  \ date no longer matters once application submitted\n\nMark these dates in your\
  \ calendar NOW. Set phone reminders.\n"
why_it_matters: 'Missing the 90-day window is catastrophic. You''ll have to leave
  Slovakia, restart

  visa process from home country (another 3-4 months), potentially lose your job.

  Many foreigners miss deadlines because they don''t realize how fast time passes.

  The 3-day registration is easy, but 90-day residence application requires intense

  document gathering. START IMMEDIATELY.

  '
official_links:
- authority: Ministry of Interior - Temporary Residence Process
  url: https://www.minv.sk/?docasny-pobyt
- authority: Foreign Police Appointments
  url: https://www.minv.sk/?objednanie-sa-na-cp
failure_modes:
- what_breaks: Treating this like "I have 3 months to figure it out"
  consequence: Sudden realization at day 80 that you're not ready, panic, mistakes
- what_breaks: Missing 90-day deadline
  consequence: Illegal residence, deportation, job loss, 2-year ban from Schengen
- what_breaks: Not booking Foreign Police appointment early
  consequence: No available slots within 90-day window
country: Slovakia
