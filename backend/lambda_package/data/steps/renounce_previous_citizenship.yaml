step_id: renounce_previous_citizenship
title: Renounce Your Previous Citizenship
jurisdiction: Slovakia
applies_to:
  persona:
    - applying_citizenship
preconditions:
  - citizenship_application_approved_pending
outputs:
  - previous_citizenship_renounced
  - renunciation_certificate_issued
description: |
  Officially renounce your previous citizenship before receiving Slovak citizenship.
  
  CRITICAL: Slovakia does NOT allow dual citizenship (with few exceptions).
  
  You MUST renounce your current citizenship to become Slovak.
  
  EXCEPTIONS (Who can keep dual citizenship):
  
  1. EU/EEA citizens can keep their EU citizenship
  2. Born Slovak but have another citizenship (can reclaim Slovak)
  3. Slovak married to non-Slovak (Slovak can keep both)
  4. Minors under 18
  
  For everyone else: Must choose Slovakia OR your current country.
  
  PROCESS VARIES BY COUNTRY:
  
  **For Indian citizens:**
  
  1. Contact Indian Embassy in Vienna, Austria
     Address: Kärntner Ring 2, 1010 Vienna
     Phone: +43 1 505 8666
     Email: cons.vienna@mea.gov.in
     Hours: Mon-Fri 9:00-13:00, 14:00-17:00
  
  2. Required documents:
     - Current Indian passport
     - Slovak citizenship approval letter (from Ministry of Interior)
     - Renunciation application form
     - 2 passport photos
     - Fee: €200
  
  3. Timeline:
     - Application submitted: 1 day
     - Processing: 3-4 months
     - Renunciation certificate issued
  
  4. Result:
     - Indian citizenship officially terminated
     - OCI (Overseas Citizen of India) card available if desired
     - Can travel to India visa-free with OCI
  
  **For US citizens:**
  
  WARNING: Renouncing US citizenship is EXPENSIVE and PERMANENT.
  
  1. Contact US Embassy in Bratislava
     Address: Hviezdoslavovo námestie 4, 811 02 Bratislava
     Phone: +421 2 5443 0861
     Hours: Mon-Fri 8:00-16:00
  
  2. Appointment required:
     - Book via: https://sk.usembassy.gov
     - Wait time: 2-3 months for appointment
  
  3. Required documents:
     - Current US passport
     - Birth certificate
     - Slovak citizenship approval letter
     - DS-4079 form (Statement of Understanding)
     - DS-4080 form (Oath of Renunciation)
  
  4. Fee: $2,350 USD (yes, really)
  
  5. Process:
     - Oath ceremony at embassy (30 min)
     - Certificate of Loss of Nationality issued
     - US passport surrendered
     - Timeline: Certificate arrives in 6-12 months
  
  6. TAX IMPLICATIONS:
     - Must file US taxes for 10 years after renunciation if net worth > $2M
     - "Exit tax" applies if you meet wealth thresholds
     - Consult a US tax attorney BEFORE renouncing
  
  **For UK citizens:**
  
  1. Contact UK Embassy in Bratislava
     Address: Panská 16, 811 01 Bratislava
     Phone: +421 2 5998 2000
     Email: bratislava.consulate@fco.gov.uk
  
  2. Required documents:
     - Current UK passport
     - Slovak citizenship approval letter
     - Renunciation declaration form RN
     - Fee: £372
  
  3. Timeline:
     - Submit application: 1 day
     - Processing: 4-8 weeks
     - Certificate of renunciation issued
  
  4. Result:
     - UK citizenship terminated
     - Cannot reclaim UK citizenship later (except in special cases)
  
  **For other countries:**
  
  Contact your country's embassy in Austria or Slovakia:
  - Each country has different procedures
  - Fees range from €50 to $2,350
  - Timeline: 1-6 months typically
  - Some countries allow dual citizenship (check first!)
  
  COUNTRIES THAT ALLOW DUAL WITH SLOVAKIA:
  
  If your country allows dual citizenship, you can:
  1. Become Slovak citizen
  2. Keep your original citizenship
  3. Have both passports
  
  Countries that allow this:
  - UK (post-Brexit, somewhat)
  - France
  - Canada
  - Australia
  - Most Latin American countries
  
  BUT: Slovakia still requires you to declare you're renouncing.
  Technically you're not supposed to keep both, but some countries don't enforce their side.
  
  IMPORTANT CONSIDERATIONS:
  
  Before renouncing, ask yourself:
  
  1. **Can I return to my home country?**
     - As a foreigner, you'll need a visa
     - May not be able to work there
     - Property ownership may be restricted
  
  2. **What about family inheritance?**
     - Some countries restrict inheritance for non-citizens
     - May face extra taxes
  
  3. **What if Slovakia doesn't work out?**
     - Getting your old citizenship back is often impossible
     - You'd be stateless if you lose Slovak citizenship
  
  4. **Pension and benefits?**
     - May lose eligibility for home country pensions
     - Check with your social security office
  
  5. **Military service?**
     - Some countries require military service to renounce
     - Check before starting process
  
  REALISTIC TIMELINE:
  
  From citizenship approval to renunciation complete:
  - Fast countries (EU): 4-8 weeks
  - Medium countries (India, UK): 3-4 months
  - Slow countries (some Asian/African countries): 6-12 months
  - US: 6-12 months (due to bureaucracy)
  
  COST BREAKDOWN:
  
  - Embassy fees: €50 - $2,350
  - Notarization: €30-50
  - Translations: €50-100
  - Travel to embassy: €50-200
  - Legal advice (recommended): €300-500
  
  Total: €500 - $3,500 depending on country
  
  AFTER RENUNCIATION:
  
  1. Receive renunciation certificate
  2. Submit to Slovak Ministry of Interior
  3. Within 2-4 weeks:
     - Receive Slovak citizenship certificate
     - Can apply for Slovak passport
  4. Old passport is cancelled/surrendered
  5. You are now Slovak only

why_it_matters: |
  This is the FINAL STEP before receiving Slovak citizenship.
  
  Slovakia's Constitution (Article 5) states:
  "Citizenship can only be singular."
  
  **Why Slovakia doesn't allow dual citizenship:**
  - Historical reasons (preventing conflict of loyalty)
  - Constitutional requirement
  - Strict interpretation by courts
  
  **Exceptions are rare:**
  - EU citizens (EU law supersedes)
  - Ethnic Slovaks abroad (special law)
  - Minors (until age 18)
  
  **This is IRREVERSIBLE:**
  - Once you renounce, you cannot undo it
  - Most countries don't allow re-naturalization easily
  - You could become stateless if you lose Slovak citizenship later
  
  **Legal requirement:**
  You MUST renounce within 90 days of citizenship approval or the approval expires.
  
  **Reality check:**
  Many people get to this point and realize:
  - They're not ready to give up their passport
  - Financial/family ties make it too risky
  - They want to keep options open
  
  About 20% of approved citizenship applicants never complete renunciation.
  
  **Think carefully before starting the citizenship path.**

official_links:
  - authority: Ministry of Interior - Citizenship Law
    url: https://www.minv.sk/?statne-obcianstvo
  - authority: Act 40/1993 on Citizenship (Article 8 - Dual Citizenship Ban)
    url: https://www.slov-lex.sk/pravne-predpisy/SK/ZZ/1993/40/

failure_modes:
  - what_breaks: Not renouncing within 90 days of citizenship approval
    consequence: Citizenship approval expires, must reapply entirely (€200 fee, 1 year process), start from scratch
  
  - what_breaks: Attempting to keep both citizenships secretly
    consequence: Slovak citizenship revoked if discovered, banned from reapplying, possible criminal charges for fraud
  
  - what_breaks: Renouncing US citizenship without understanding tax implications
    consequence: Unexpected "exit tax" bill, may owe tens of thousands in taxes, 10-year IRS tracking
  
  - what_breaks: Not checking if your home country allows you to return
    consequence: Become unable to visit family or return home without visa, potential permanent exile
  
  - what_breaks: Assuming you can reclaim your old citizenship later
    consequence: Most countries don't allow this, you're stuck with only Slovak citizenship permanently

