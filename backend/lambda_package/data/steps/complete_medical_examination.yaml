step_id: complete_medical_examination
title: Complete Medical Examination for Residence Permit
jurisdiction: Slovakia
applies_to:
  persona:
    - non_eu_employee_slovakia
    - non_eu_business_slovakia  
    - non_eu_family_slovakia
preconditions:
  - national_visa_granted
outputs:
  - medical_certificate_issued
description: |
  Undergo mandatory medical examination at an authorized Slovak medical facility.
  
  REQUIRED FOR:
  - All temporary residence permits (work, business, family)
  - Permanent residence permits
  - Long-term visa Type D (in some cases)
  
  WHERE TO GO - AUTHORIZED FACILITIES:
  
  **Bratislava:**
  - Poliklinika Ružinov
    Address: Ružinovská 10, 821 08 Bratislava
    Phone: +421 2 4826 2111
    Hours: Mon-Fri 7:00-15:00
    
  - Fakultná nemocnica s poliklinikou F.D. Roosevelta (FNsP)
    Address: Nábrežie L. Svobodu 1, 974 01 Banská Bystrica
    Phone: +421 48 441 1111
    Hours: Mon-Fri 7:00-14:00
    
  - Lekárske služby FirstMed
    Address: Hattalova 12/A, 831 03 Bratislava
    Phone: +421 2 5441 2000
    Hours: Mon-Fri 8:00-18:00, Sat 8:00-12:00
    English-speaking staff available
  
  **Košice:**
  - Poliklinika Železničná
    Address: Železničná 1, 040 01 Košice
    Phone: +421 55 622 4111
    Hours: Mon-Fri 7:00-15:00
  
  WHAT TESTS YOU'LL GET:
  
  1. General physical examination
     - Height, weight, blood pressure
     - Cardiovascular examination
     - Respiratory examination
     - General health assessment
  
  2. Chest X-ray (mandatory)
     - Tuberculosis screening
     - Lung health check
     - Results available same day or next day
  
  3. Blood tests (mandatory)
     - HIV test
     - Hepatitis B and C
     - Syphilis (VDRL/RPR)
     - General blood count
     - Results: 2-5 working days
  
  4. Urine test
     - General health indicators
     - Drug screening (in some cases)
  
  5. Doctor consultation
     - Review of medical history
     - Discussion of any chronic conditions
     - Confirmation of fitness for residence
  
  COST:
  - Total: €80-150 (varies by facility)
  - Breakdown:
    * Doctor consultation: €30-50
    * Chest X-ray: €25-40
    * Blood tests: €40-70
    * Certificate issuance: €5-10
  
  WHAT TO BRING:
  - Valid passport with visa
  - Previous medical records (if available)
  - List of current medications
  - Cash or card for payment
  - Passport photo (some facilities require)
  
  APPOINTMENT PROCESS:
  
  1. Call ahead to book appointment (recommended)
     - Walk-ins accepted but may wait 2-3 hours
     - Specify: "Immigration medical examination" (lekárske vyšetrenie na pobytové povolenie)
  
  2. Arrive fasting (8-12 hours)
     - Required for blood tests
     - You can drink water
     - Bring snack for after tests
  
  3. Full examination takes 1-2 hours
     - All tests done same day
     - Some results immediate, blood tests take 2-5 days
  
  4. Certificate collection:
     - Most facilities: pick up in 3-7 working days
     - Can be sent by email (PDF) or post
     - Original required for Foreign Police
  
  CERTIFICATE DETAILS:
  
  The medical certificate (zdravotné osvedčenie) includes:
  - Your personal data
  - List of tests performed with results
  - Doctor's conclusion: "FIT FOR RESIDENCE" or not
  - Doctor's signature and clinic stamp
  - Validity: 3 months from issue date
  
  VALIDITY:
  - Certificate valid for 3 months only
  - Must submit to Foreign Police within 3 months
  - If expired, must repeat entire examination
  - Plan timing: get medical 1-2 months before residence application
  
  LANGUAGE:
  - Certificate issued in Slovak
  - Some clinics offer English translation (+€20-30)
  - Official translation not usually required
  - Foreign Police accepts Slovak certificates
  
  WHAT IF TESTS SHOW ISSUES:
  
  Conditions that MAY affect approval:
  - Active tuberculosis (automatic denial until treated)
  - Untreated HIV (usually okay if on treatment)
  - Hepatitis B/C (usually okay, just noted)
  - Drug use indicators (may require explanation)
  
  Most conditions are acceptable if:
  - You're under medical treatment
  - Condition is controlled/stable
  - No public health risk
  
  SPECIAL CASES:
  
  Pregnant women:
  - Chest X-ray can be postponed (with doctor's note)
  - Other tests proceed normally
  - May need additional documentation
  
  Children under 18:
  - Same tests required
  - Parent/guardian must be present
  - Some facilities have pediatric specialists
  
  Chronic conditions:
  - Bring medical records and prescriptions
  - May need letter from your home country doctor
  - Translation to Slovak or English helpful
why_it_matters: |
  Medical examination is MANDATORY - you cannot get residence permit without it.
  
  **Consequences of skipping:**
  - Residence permit application rejected immediately
  - No refund of application fees (€170+)
  - Must restart entire process
  - Potential delays of 2-3 months
  
  **Consequences of expired certificate:**
  - Foreign Police will not accept
  - Must redo entire examination (€80-150 again)
  - Application timeline delayed
  
  **Public health requirements:**
  - Slovakia must protect public health
  - Tuberculosis screening is especially strict
  - Active TB = automatic denial (must complete treatment first, usually 6-12 months)
  
  **Your health matters:**
  - This catches serious conditions early
  - Free screening worth €100+ in most countries
  - Ensures you're healthy for your new life in Slovakia
  
  **Timing is critical:**
  - Certificate valid only 3 months
  - If your residence application is delayed, certificate may expire
  - Plan to get medical 1-2 months before applying
  - Some people get medical AFTER collecting all other documents
