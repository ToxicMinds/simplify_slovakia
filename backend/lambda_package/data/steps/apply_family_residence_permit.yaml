step_id: apply_family_residence_permit
title: Apply for Family Residence Permit
applies_to:
  persona: family_member_bratislava
preconditions:
- legal_entry_completed
- foreign_police_registered
outputs:
- family_residence_granted
description: "Apply at Foreign Police for temporary residence permit as family member.\n\
  Must apply within 3 working days of entry on national visa.\n\nRequired documents:\n\
  - Valid passport + national visa\n- All relationship documents (same as visa application)\n\
  - Sponsor documents:\n  * Original residence card\n  * Proof of accommodation\n\
  \  * Bank statements (last 3 months)\n  * Employment/income proof\n  * Health insurance\
  \ covering applicant\n- Applicant's health insurance\n- Clean criminal record (if\
  \ not submitted for visa)\n- Proof of financial means (sponsor's responsibility)\n\
  - 4 passport photos\n- Application form\n- Fee: €170\n\nProcessing: 90 days typically.\
  \ You receive receipt allowing legal stay.\n\nPermit duration: Usually matches sponsor's\
  \ permit (max 2 years initially).\n"
why_it_matters: 'This grants you legal residence in Slovakia. You can work without
  separate work permit

  once you receive this card. Children can enroll in schools immediately.

  '
official_links:
- authority: Foreign Police Bratislava
  url: https://www.minv.sk/?kontakty-cudzinecka-policia
- authority: Ministry of Interior - Family Residence
  url: https://www.minv.sk/?pobyt-rodinneho-prislusnika
failure_modes:
- what_breaks: Sponsor loses their residence during processing
  consequence: Your application automatically rejected
- what_breaks: Applying after 3-day deadline
  consequence: Fine €50-1,000, application may be rejected
country: Slovakia
