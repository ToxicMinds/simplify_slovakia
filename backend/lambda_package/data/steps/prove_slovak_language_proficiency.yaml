step_id: prove_slovak_language_proficiency
title: Prove Slovak Language Proficiency (B1 Level)
applies_to:
  persona: long_term_resident_bratislava
preconditions:
- five_year_documentation_complete
outputs:
- language_proficiency_proven
description: "Demonstrate B1 level Slovak language proficiency. This is MANDATORY\
  \ for permanent\nresidence (with few exceptions).\n\nHow to prove:\n1. Official\
  \ B1 certificate from Ministry of Education recognized institution:\n   - State\
  \ Language School (Štátna jazyková škola)\n   - Studia Academica Slovaca (Comenius\
  \ University)\n   - Cost: €40-200 for exam\n\n2. Slovak university degree (any level)\n\
  \n3. Slovak secondary school graduation certificate\n\nExempt from language requirement:\n\
  - Age 65+\n- Severe disability preventing learning\n- Slovak ancestry with grandparent\
  \ born in Slovakia\n\nThe exam tests:\n- Reading comprehension\n- Writing (short\
  \ essay, 80-100 words)\n- Listening (recorded dialogues)\n- Speaking (conversation\
  \ with examiner, 10 min)\n\nPreparation time: 6-12 months of regular study if starting\
  \ from zero.\n"
why_it_matters: 'This is the most common rejection reason. Without valid B1 certificate,
  your

  application is automatically rejected. The certificate must be issued within 1 year

  of application. Budget 3-6 months for exam scheduling.

  '
official_links:
- authority: Studia Academica Slovaca (Comenius University)
  url: https://sas.uniba.sk/
- authority: List of recognized institutions
  url: https://www.minedu.sk/
failure_modes:
- what_breaks: Certificate older than 1 year
  consequence: Not accepted, must retake exam
- what_breaks: Non-recognized institution certificate
  consequence: Rejected, must get proper certificate
country: Slovakia
