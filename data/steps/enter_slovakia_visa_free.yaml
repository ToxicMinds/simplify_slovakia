step_id: enter_slovakia_visa_free
title: Enter Slovakia Visa-Free
country: Slovakia
applies_to:
  persona:
    - tourist_visa_free_entry
preconditions:
  - entry_documents_prepared
outputs:
  - legal_entry_completed
description: |
  Enter Slovakia (or any Schengen country) without a visa.
  
  AT THE AIRPORT (Departure from home country):
  
  1. Airline check-in
     - Show passport
     - Airline may ask for return ticket
     - Verify passport validity (6 months)
  
  2. Immigration exit
     - Standard exit procedure in your country
  
  AT SCHENGEN ENTRY POINT:
  
  Most common routes for visa-free travelers:
  - Direct to Bratislava (rare)
  - Via Frankfurt, Munich, Vienna, Prague → Bratislava
  
  IMMIGRATION PROCESS:
  
  1. Join "Non-EU/Other Passports" queue
     - NOT the EU/EEA queue
     - Usually shorter than visa queue
  
  2. Approach immigration officer
     - Hand over passport
     - May ask for boarding pass
  
  3. Questions you may be asked:
     - "What is the purpose of your visit?"
       Answer: "Tourism" or "Visiting family/friends"
     
     - "Where will you stay?"
       Answer: Specific hotel name/address or friend's name
     
     - "How long are you staying?"
       Answer: Exact number of days
     
     - "Do you have a return ticket?"
       Answer: "Yes" and be ready to show it
     
     - "How will you support yourself?"
       Answer: "I have €X cash and credit cards"
     
     - "Is this your first time in Europe?"
       Answer: Honestly (yes/no, mention previous trips if any)
     
     - "Do you have accommodation booked?"
       Answer: "Yes" and be ready to show booking
  
  4. If officer wants to see documents:
     - Stay calm
     - Show return ticket first
     - Then accommodation
     - Then funds (credit card or cash)
     - Travel insurance if asked
     - Answer clearly and confidently
  
  5. Officer stamps passport
     - Entry stamp with date
     - This starts your 90-day countdown
     - TAKE PHOTO of stamp immediately
     - Check stamp is clear and readable
  
  6. Proceed to baggage claim
  
  TYPICAL EXPERIENCE:
  - For most visa-free travelers: 30 seconds, no questions
  - Occasionally: 2-3 questions, 1-2 minutes
  - Rarely: Detailed questioning, 5-15 minutes
  
  WHAT TRIGGERS DETAILED QUESTIONING:
  - First time in Schengen
  - Traveling alone
  - Young person with expensive trip
  - Unusual travel pattern
  - Long stay (close to 90 days)
  - Previous overstays or violations
  - Random selection
  
  SECONDARY INSPECTION:
  If officer asks you to step aside:
  - Don't panic - routine procedure
  - Be cooperative and polite
  - Answer honestly
  - Show all documents
  - Usually resolved in 10-30 minutes
  - About 3-5% of visa-free travelers experience this
  
  DENIED ENTRY:
  If denied (very rare, ~0.5% of visa-free travelers):
  - You will be told reason
  - Passport marked with denial
  - Held in airport detention
  - Deported on next available flight (you pay)
  - May be banned from Schengen (1-5 years)
  
  Common denial reasons:
  - Can't prove intent to leave
  - Suspicious answers
  - Insufficient funds
  - Previous immigration violations
why_it_matters: |
  Even with visa-free entry, border officers have full authority to deny entry.
  
  Being prepared and confident makes huge difference:
  - Prepared travelers: <0.5% denial rate
  - Unprepared travelers: ~5% denial rate
  
  Answer questions honestly and briefly:
  - Don't over-explain or volunteer extra information
  - Don't mention work (even remote work)
  - Don't say you're "visiting to see if you like it" (sounds like immigration intent)
  - Do say "tourism" or "visiting friends/family"
  
  The entry stamp is CRITICAL:
  - Starts your 90-day clock
  - Proves legal entry
  - Needed for police registration
  - Needed for future visa applications
  
  If stamp is missing or unclear, ask officer to redo it!
official_links:
  - authority: Schengen Border Code
    url: https://home-affairs.ec.europa.eu/schengen-borders-and-visa_en
failure_modes:
  - what_breaks: Nervous or evasive answers
    consequence: Detained for secondary questioning, possible denial
  - what_breaks: Mentioning "work" or "business" for tourist entry
    consequence: Denied for wrong visa category
  - what_breaks: No entry stamp given (officer forgot)
    consequence: No proof of entry, problems at exit and future entries - ALWAYS verify you got stamped
  - what_breaks: Arguing with border officer
    consequence: Denied entry for "uncooperative behavior"
