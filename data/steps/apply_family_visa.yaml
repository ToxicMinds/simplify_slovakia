step_id: apply_family_visa
title: Apply for National Visa (Type D) - Family Reunification
applies_to:
  persona: family_member_bratislava
preconditions:
- relationship_documents_ready
outputs:
- family_visa_granted
description: "Apply at Slovak embassy/consulate in your home country for National\
  \ Visa (Type D)\nfor family reunification purpose. Must apply from outside Slovakia.\n\
  \nRequired documents:\n- Valid passport (min. 3 months beyond visa validity)\n-\
  \ Completed visa application form\n- All relationship documents (apostilled, translated)\n\
  - Sponsor's documents:\n  * Copy of residence card\n  * Proof of accommodation (rental\
  \ contract/ownership)\n  * Bank statements (last 3 months)\n  * Employment contract\
  \ or business income proof\n- Health insurance (min. €30,000 Schengen coverage)\n\
  - Clean criminal record (apostilled, translated)\n- 2 passport photos\n- Visa fee\
  \ (~€100)\n\nProcessing time: 60-120 days typically.\n"
why_it_matters: 'This visa allows 90 days to enter and apply for family residence
  permit.

  Entering on tourist visa then trying to stay is illegal and results in deportation.

  '
official_links:
- authority: Ministry of Foreign Affairs - Family Visa
  url: https://www.mzv.sk/web/en/consular_info/family_reunification
failure_modes:
- what_breaks: Sponsor doesn't meet income requirements
  consequence: Visa denied for insufficient financial means
- what_breaks: Accommodation too small for family size
  consequence: Visa rejected
country: Slovakia
