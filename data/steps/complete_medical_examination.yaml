  url: https://www.health.gov.sk/
- authority: Poliklinika Ružinov Bratislava
  url: http://www.poliklinika-ruzinov.sk/
- authority: FirstMed Slovakia (English-speaking)
  url: https://www.firstmedcenters.com/slovakia/
failure_modes:
- what_breaks: Getting medical exam at non-authorized facility
  consequence: Certificate not accepted by Foreign Police, must redo at authorized
    facility (€80-150 wasted)
- what_breaks: Submitting expired medical certificate (over 3 months old)
  consequence: Application rejected, must redo entire medical exam
- what_breaks: Active tuberculosis found on chest X-ray
  consequence: Residence permit denied until TB treatment completed (6-12 months delay),
    must leave Slovakia during treatment
- what_breaks: Failing to bring certificate to Foreign Police appointment
  consequence: Application rejected, appointment rescheduled (2-4 week delay)
- what_breaks: Getting medical too early (4-5 months before application)
  consequence: Certificate expires before you submit application, must redo exam
- what_breaks: Not fasting before blood tests
  consequence: Test results invalid, must return for new blood draw (+€40-70)
country: Slovakia
