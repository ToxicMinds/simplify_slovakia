failure_modes:
  - what_breaks: Taking exam at non-accredited school
    consequence: Certificate not recognized by Foreign Police, must retake at official center (€100 wasted, 2-3 month delay)
  
  - what_breaks: Not preparing adequately (self-study only, no course)
    consequence: 70% fail rate on first attempt, must wait 2-3 months to retake, delays permanent residence by 6+ months
  
  - what_breaks: Waiting to start studying until you're "ready to apply"
    consequence: Realize you need 12-18 months of study, permanent residence application delayed by 1-2 years
  
  - what_breaks: Assuming A2 level is enough
    consequence: Foreign Police rejects application, must achieve B1 and reapply (6-12 month delay)
  
  - what_breaks: Certificate expires before you submit application
    consequence: Must retake entire exam (€100, 4-6 weeks for results), application delayed
  
  - what_breaks: Only studying grammar, not speaking practice
    consequence: Fail speaking portion (60% of people fail here), must retake speaking part

